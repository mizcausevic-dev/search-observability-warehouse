name: CI

on:
  push:
    branches:
      - main
      - project/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run demo build
        run: python scripts/run_demo.py
      - name: Run tests
        run: python -m unittest discover -s tests
